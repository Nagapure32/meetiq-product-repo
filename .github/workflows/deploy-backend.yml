name: Deploy Backend (disabled)

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: aress-meetiq-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    if: false
    name: Deploy FastAPI to Azure App Service
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - name: Prepare backend deployment package
        shell: bash
        run: |
          rm -rf backend-deploy
          mkdir -p backend-deploy
          cp -R backend/app backend-deploy/app
          cp backend/requirements.txt backend-deploy/requirements.txt
      - name: Deploy backend
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_BACKEND_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
          package: backend-deploy
